<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParseBox Kiosk</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        --bg-1: #041022;
        --bg-2: #0c2040;
        --ink: #ecf2ff;
        --ink-dim: #b3c2e3;
        --accent: #47f0b5;
        --danger: #ff6b6b;
        --panel: rgba(7, 17, 34, 0.72);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 18% 12%, #195fb0 0, transparent 42%),
          radial-gradient(circle at 82% 88%, #1b7e68 0, transparent 38%),
          linear-gradient(155deg, var(--bg-1), var(--bg-2));
        color: var(--ink);
      }
      main {
        width: min(460px, calc(100vw - 2rem));
        border-radius: 24px;
        padding: 1.5rem;
        box-sizing: border-box;
        background: var(--panel);
        border: 1px solid rgba(154, 198, 255, 0.24);
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 35px rgba(2, 8, 18, 0.45);
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 10vw, 2.6rem);
        line-height: 1;
        letter-spacing: 0.04em;
      }
      .subtitle {
        margin-top: 0.55rem;
        margin-bottom: 1.4rem;
        color: var(--ink-dim);
        font-size: 1rem;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      button {
        border: 0;
        border-radius: 12px;
        color: #071321;
        background: linear-gradient(180deg, #8df7d4, #47f0b5);
        min-height: 52px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      button.danger {
        color: #fff;
        background: linear-gradient(180deg, #ff8f8f, #ff6b6b);
      }
      button:disabled {
        filter: grayscale(0.15) brightness(0.75);
        cursor: wait;
      }
      .status {
        min-height: 1.5rem;
        margin-top: 0.8rem;
        margin: 0;
        color: var(--ink-dim);
        font-size: 0.95rem;
      }
      .status.error {
        color: #ffd1d1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ParseBox</h1>
      <p class="subtitle">Raspberry Pi kiosk control surface</p>
      <section class="controls" aria-label="Power controls">
        <button id="rebootButton" type="button">Reboot</button>
        <button id="shutdownButton" class="danger" type="button">Shutdown</button>
      </section>
      <p id="status" class="status" role="status" aria-live="polite">Ready.</p>
    </main>
    <script type="module">
      const rebootButton = document.getElementById("rebootButton");
      const shutdownButton = document.getElementById("shutdownButton");
      const status = document.getElementById("status");

      function setBusy(busy) {
        rebootButton.disabled = busy;
        shutdownButton.disabled = busy;
      }

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      async function sendPowerAction(action) {
        const confirmed = window.confirm(`Are you sure you want to ${action} this device?`);
        if (!confirmed) {
          return;
        }

        setBusy(true);
        setStatus(`Sending ${action} request...`);

        try {
          const response = await fetch(`/api/system/${action}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });

          const body = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(body.error ?? `Request failed with ${response.status}`);
          }

          setStatus(`${action} requested. Device will transition shortly.`);
        } catch (error) {
          setStatus(`Failed to ${action}: ${String(error)}`, true);
          setBusy(false);
        }
      }

      rebootButton.addEventListener("click", () => {
        void sendPowerAction("reboot");
      });

      shutdownButton.addEventListener("click", () => {
        void sendPowerAction("shutdown");
      });
    </script>
  </body>
</html>
